<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>ATOM X PRO P2P</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
--bg:#0b0e11;
--card:#1e2329;
--border:#2b3139;
--yellow:#FCD535;
--green:#0ECB81;
--red:#F6465D;
--text:#EAECEF;
--muted:#848E9C;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
-webkit-tap-highlight-color:transparent;
}

.tab-content{
display:none;
animation:fade .2s ease;
}

.tab-content.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

input,textarea,select{
background:#181a20!important;
border:1px solid var(--border)!important;
color:white!important;
outline:none!important;
}

input:focus,
textarea:focus,
select:focus{
border-color:var(--yellow)!important;
}

::-webkit-scrollbar{
width:3px;
}

::-webkit-scrollbar-thumb{
background:#333;
border-radius:10px;
}

.nav-item{
color:#848E9C;
}

.nav-item.active{
color:white;
}

.chat-box{
height:300px;
overflow-y:auto;
}

</style>

</head>

<body class="pb-24">

<!-- TOAST -->

<div id="toast-container"
class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] space-y-2">
</div>

<!-- HEADER -->

<header class="sticky top-0 z-50
bg-[#0b0e11]
border-b border-[#2b3139]
px-4 py-3
flex justify-between items-center">

<div class="flex items-center gap-3">

<div id="header-avatar"
class="w-10 h-10 rounded-full
bg-[#2b3139]
flex items-center justify-center
font-black border-2 border-[#FCD535]">
A
</div>

<div>

<div class="flex items-center gap-2">

<div class="bg-[#FCD535]
text-black
px-2 py-1
rounded text-[10px]
font-black">
AX
</div>

<h1 class="font-black tracking-wide">
ATOM X PRO
</h1>

</div>

<p class="text-[10px] text-[#848E9C]">
Professional P2P Exchange
</p>

</div>

</div>

<div class="bg-[#1e2329]
border border-[#2b3139]
px-2 py-1
rounded
text-xs
font-bold">
ETB
</div>

</header>

<!-- MAIN -->

<main>

<!-- MARKET -->

<section id="market-view"
class="tab-content active">

<div class="sticky top-[69px]
bg-[#0b0e11]
border-b border-[#2b3139]
px-4 py-3 z-40">

<div class="flex gap-6">

<button
onclick="setMarket('buy')"
id="btn-market-buy"
class="font-black border-b-2 border-[#FCD535] pb-1">
BUY
</button>

<button
onclick="setMarket('sell')"
id="btn-market-sell"
class="text-[#848E9C] font-black pb-1">
SELL
</button>

</div>

</div>

<div id="market-list"
class="p-3 space-y-3">
</div>

</section>

<!-- MY ADS -->

<section id="myads-view"
class="tab-content p-4">

<div class="flex justify-between items-center mb-4">

<h2 class="text-xl font-black">
My Ads
</h2>

<button
onclick="openPostAdForm()"
class="bg-[#FCD535]
text-black
font-black
px-4 py-2
rounded-xl text-sm">

<i class="fa-solid fa-plus"></i>
Post Ad

</button>

</div>

<div id="my-published-ads-list"
class="space-y-3">
</div>

</section>

<!-- POST AD -->

<section id="post-view"
class="tab-content p-4 space-y-4">

<div class="flex items-center gap-3">

<button
onclick="switchMainTab('myads')">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h2 class="text-xl font-black">
Create Advertisement
</h2>

</div>

<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4
space-y-4">

<div class="flex bg-[#0b0e11]
rounded-xl p-1">

<button
onclick="setAdType('buy')"
id="ad-type-buy"
class="flex-1 py-2 rounded-lg
bg-[#0ECB81]
font-black">
BUY
</button>

<button
onclick="setAdType('sell')"
id="ad-type-sell"
class="flex-1 py-2 rounded-lg
text-[#848E9C]
font-black">
SELL
</button>

</div>

<input type="hidden"
id="ad-type"
value="buy">

<div>

<label class="text-xs text-[#848E9C]">
Price (ETB)
</label>

<input
id="ad-price"
type="number"
placeholder="125"
class="w-full p-3 rounded-xl mt-1">

</div>

<div>

<label class="text-xs text-[#848E9C]">
USDT Amount
</label>

<input
id="ad-amount"
type="number"
placeholder="100"
class="w-full p-3 rounded-xl mt-1">

</div>

<div class="grid grid-cols-2 gap-3">

<div>

<label class="text-xs text-[#848E9C]">
Min
</label>

<input
id="ad-min"
type="number"
placeholder="10"
class="w-full p-3 rounded-xl mt-1">

</div>

<div>

<label class="text-xs text-[#848E9C]">
Max
</label>

<input
id="ad-max"
type="number"
placeholder="100"
class="w-full p-3 rounded-xl mt-1">

</div>

</div>

<div>

<label class="text-xs text-[#848E9C]">
Payment Method
</label>

<select
id="ad-payment-method"
class="w-full p-3 rounded-xl mt-1">

<option>Telebirr</option>
<option>CBE</option>
<option>BOA</option>

</select>

</div>

<div>

<label class="text-xs text-[#848E9C]">
Terms
</label>

<textarea
id="ad-terms"
rows="3"
placeholder="Write rules..."
class="w-full p-3 rounded-xl mt-1"></textarea>

</div>

<button
onclick="publishAd()"
class="w-full
bg-[#FCD535]
text-black
font-black
py-3
rounded-xl">

Post Advertisement

</button>

</div>

</section>

<!-- PROFILE -->

<section id="profile-view"
class="tab-content p-4 space-y-4">

<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4">

<div class="flex items-center gap-3">

<div id="prof-avatar"
class="w-14 h-14 rounded-full
bg-[#2b3139]
flex items-center justify-center
font-black text-lg
border-2 border-[#FCD535]">
A
</div>

<div>

<h2 id="prof-name"
class="font-black text-lg">
Loading...
</h2>

<p id="prof-status-text"
class="text-xs text-[#848E9C]">
STATUS
</p>

</div>

</div>

</div>

<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4
space-y-4">

<h3 class="font-black">
Payment Methods
</h3>

<input
id="pm-tele-name"
type="text"
placeholder="Telebirr Name"
class="w-full p-3 rounded-xl">

<input
id="pm-tele-phone"
type="number"
placeholder="Telebirr Number"
class="w-full p-3 rounded-xl">

<input
id="pm-cbe-acc"
type="number"
placeholder="CBE Account"
class="w-full p-3 rounded-xl">

<input
id="pm-binance-id"
type="number"
placeholder="Binance Pay ID"
class="w-full p-3 rounded-xl">

<button
onclick="saveProfile()"
class="w-full
bg-[#FCD535]
text-black
font-black
py-3
rounded-xl">

Save Profile

</button>

</div>

</section>

<!-- ADMIN -->

<section id="admin-view"
class="tab-content p-4">

<h2 class="text-xl font-black
text-[#F6465D]
mb-4">

SUPER ADMIN

</h2>

<div id="admin-users"
class="space-y-3">
</div>

</section>

</main>

<!-- NAV -->

<nav class="fixed bottom-0 w-full
bg-[#0b0e11]
border-t border-[#2b3139]
flex justify-around
py-3 z-50">

<button
onclick="switchMainTab('market')"
id="nav-market"
class="nav-item active
flex flex-col items-center gap-1">

<i class="fa-solid fa-chart-line"></i>

<span class="text-[10px] font-bold">
Market
</span>

</button>

<button
onclick="switchMainTab('myads')"
id="nav-myads"
class="nav-item
flex flex-col items-center gap-1">

<i class="fa-solid fa-list"></i>

<span class="text-[10px] font-bold">
My Ads
</span>

</button>

<button
onclick="switchMainTab('profile')"
id="nav-profile"
class="nav-item
flex flex-col items-center gap-1">

<i class="fa-solid fa-user"></i>

<span class="text-[10px] font-bold">
Profile
</span>

</button>

<button
onclick="switchMainTab('admin')"
id="nav-admin"
class="nav-item hidden
flex flex-col items-center gap-1
text-[#FCD535]">

<i class="fa-solid fa-crown"></i>

<span class="text-[10px] font-bold">
Admin
</span>

</button>

</nav>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyD3getH9kSW2oHuOI9AZR8t4yZ34_jPZG0",

authDomain:"atomx-exchange.firebaseapp.com",

databaseURL:"https://atomx-exchange-default-rtdb.firebaseio.com",

projectId:"atomx-exchange",

storageBucket:"atomx-exchange.appspot.com"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* TELEGRAM */

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe?.user || {
id:7798504269,
first_name:"Admin"
};

const ADMIN_ID = 7798504269;

/* GLOBAL */

let myData = {};
let currentMarket = "buy";

/* START */

window.onload = async()=>{

if(user.id == ADMIN_ID){

document
.getElementById("nav-admin")
.classList.remove("hidden");

}

initUser();

loadMarketAds();

loadMyAds();

loadAdminData();

};

/* USER */

function initUser(){

db.ref("users/"+user.id)
.on("value",snap=>{

myData = snap.val();

if(!myData){

db.ref("users/"+user.id)
.set({

name:user.first_name,

status:"verified",

isBanned:false,

createdAt:Date.now()

});

return;

}

if(myData.isBanned){

document.body.innerHTML =
`
<div class="h-screen flex items-center justify-center text-center p-5">

<div>

<i class="fa-solid fa-ban text-6xl text-red-500 mb-4"></i>

<h1 class="text-2xl font-black mb-2">
ACCOUNT BANNED
</h1>

<p class="text-gray-400">
You are blocked by admin
</p>

</div>

</div>
`;

return;

}

updateProfileUI();

});

}

function updateProfileUI(){

document.getElementById("prof-name").innerText =
myData.name || "User";

document.getElementById("prof-avatar").innerText =
(myData.name || "U")
.charAt(0)
.toUpperCase();

document.getElementById("header-avatar").innerText =
(myData.name || "U")
.charAt(0)
.toUpperCase();

document.getElementById("prof-status-text").innerText =
"STATUS : " + myData.status.toUpperCase();

document.getElementById("pm-tele-name").value =
myData.teleName || "";

document.getElementById("pm-tele-phone").value =
myData.telePhone || "";

document.getElementById("pm-cbe-acc").value =
myData.cbeAcc || "";

document.getElementById("pm-binance-id").value =
myData.binanceId || "";

}

function saveProfile(){

db.ref("users/"+user.id)
.update({

teleName:
document.getElementById("pm-tele-name").value,

telePhone:
document.getElementById("pm-tele-phone").value,

cbeAcc:
document.getElementById("pm-cbe-acc").value,

binanceId:
document.getElementById("pm-binance-id").value

});

showToast("Profile Saved");

}

/* NAV */

function switchMainTab(id){

document
.querySelectorAll(".tab-content")
.forEach(e=>{

e.classList.remove("active");

});

document
.querySelectorAll(".nav-item")
.forEach(e=>{

e.classList.remove("active");

});

document
.getElementById(id+"-view")
.classList.add("active");

document
.getElementById("nav-"+id)
.classList.add("active");

}

/* MARKET */

function setMarket(type){

currentMarket = type;

document.getElementById("btn-market-buy")
.className =
type=="buy"
?
"font-black border-b-2 border-[#FCD535] pb-1"
:
"text-[#848E9C] font-black pb-1";

document.getElementById("btn-market-sell")
.className =
type=="sell"
?
"font-black border-b-2 border-[#FCD535] pb-1"
:
"text-[#848E9C] font-black pb-1";

loadMarketAds();

}

function loadMarketAds(){

const list =
document.getElementById("market-list");

db.ref("ads").on("value",snap=>{

list.innerHTML = "";

if(!snap.exists()){

list.innerHTML =
`
<div class="text-center py-20 text-gray-500">

No Ads Available

</div>
`;

return;

}

let ads = [];

snap.forEach(child=>{

ads.push({

id:child.key,
...child.val()

});

});

ads = ads.filter(ad=>{

return currentMarket=="buy"
?
ad.type=="sell"
:
ad.type=="buy";

});

ads.forEach(ad=>{

if(ad.uid == user.id) return;

const btnColor =
currentMarket=="buy"
?
"bg-[#0ECB81]"
:
"bg-[#F6465D]";

const btnText =
currentMarket=="buy"
?
"BUY"
:
"SELL";

list.innerHTML +=
`
<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4">

<div class="flex justify-between">

<div>

<div class="flex items-center gap-2 mb-2">

<div class="w-9 h-9 rounded-full
bg-[#2b3139]
flex items-center justify-center
font-black">

${ad.userName.charAt(0)}

</div>

<div>

<h3 class="font-black">
${ad.userName}
</h3>

<p class="text-[10px] text-[#0ECB81]">
VERIFIED
</p>

</div>

</div>

<div class="text-xs text-gray-400 space-y-1">

<div>
Available:
<span class="text-white font-bold">
${ad.amount} USDT
</span>
</div>

<div>
Limit:
<span class="text-white font-bold">
${ad.min} - ${ad.max}
</span>
</div>

<div>
<span class="bg-[#2b3139]
px-2 py-1
rounded
text-[#FCD535]
font-bold text-[10px]">

${ad.paymentMethod}

</span>
</div>

</div>

</div>

<div class="text-right">

<div class="text-2xl font-black">
${ad.price}
</div>

<div class="text-[11px] text-gray-500 mb-3">
ETB
</div>

<button
class="${btnColor}
text-black
font-black
px-5 py-2
rounded-xl">

${btnText}

</button>

</div>

</div>

</div>
`;

});

});

}

/* POST AD */

function openPostAdForm(){

switchMainTab("post");

}

function setAdType(type){

document.getElementById("ad-type").value = type;

document.getElementById("ad-type-buy")
.className =
type=="buy"
?
"flex-1 py-2 rounded-lg bg-[#0ECB81] font-black"
:
"flex-1 py-2 rounded-lg text-[#848E9C] font-black";

document.getElementById("ad-type-sell")
.className =
type=="sell"
?
"flex-1 py-2 rounded-lg bg-[#F6465D] font-black"
:
"flex-1 py-2 rounded-lg text-[#848E9C] font-black";

}

function publishAd(){

const data = {

uid:user.id,

userName:myData.name,

type:
document.getElementById("ad-type").value,

price:Number(
document.getElementById("ad-price").value
),

amount:Number(
document.getElementById("ad-amount").value
),

min:Number(
document.getElementById("ad-min").value
),

max:Number(
document.getElementById("ad-max").value
),

paymentMethod:
document.getElementById("ad-payment-method").value,

terms:
document.getElementById("ad-terms").value,

createdAt:Date.now()

};

db.ref("ads")
.push(data)
.then(()=>{

showToast("Advertisement Posted");

switchMainTab("market");

});

}

/* MY ADS */

function loadMyAds(){

db.ref("ads")
.on("value",snap=>{

const box =
document.getElementById("my-published-ads-list");

box.innerHTML = "";

snap.forEach(child=>{

const ad = child.val();

if(ad.uid == user.id){

box.innerHTML +=
`
<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4">

<div class="flex justify-between items-center">

<div>

<div class="font-black">
${ad.amount} USDT
</div>

<div class="text-xs text-gray-400">
${ad.price} ETB
</div>

</div>

<button
onclick="deleteAd('${child.key}')"
class="bg-red-500
text-white
px-4 py-2
rounded-xl
text-xs
font-black">

DELETE

</button>

</div>

</div>
`;

}

});

});

}

function deleteAd(id){

if(!confirm("Delete this ad?")) return;

db.ref("ads/"+id)
.remove();

showToast("Advertisement Deleted");

}

/* ADMIN */

function loadAdminData(){

db.ref("users")
.on("value",snap=>{

const users =
snap.val() || {};

const box =
document.getElementById("admin-users");

box.innerHTML = "";

Object.keys(users)
.forEach(uid=>{

const u = users[uid];

box.innerHTML +=
`
<div class="bg-[#1e2329]
border border-[#2b3139]
rounded-2xl
p-4">

<div class="flex justify-between items-center">

<div>

<div class="font-black">
${u.name}
</div>

<div class="text-xs text-gray-400">
${uid}
</div>

</div>

<div class="flex gap-2">

<button
onclick="toggleBan('${uid}',true)"
class="bg-red-500
text-white
px-3 py-1
rounded
text-xs
font-black">

BAN

</button>

<button
onclick="toggleBan('${uid}',false)"
class="bg-green-500
text-black
px-3 py-1
rounded
text-xs
font-black">

UNBAN

</button>

</div>

</div>

</div>
`;

});

});

}

function toggleBan(uid,val){

db.ref("users/"+uid)
.update({

isBanned:val

});

showToast("User Updated");

}

/* TOAST */

function showToast(msg){

const t =
document.createElement("div");

t.className =
`
bg-[#FCD535]
text-black
px-4 py-2
rounded-xl
font-black
text-xs
shadow-xl
`;

t.innerText = msg;

document
.getElementById("toast-container")
.appendChild(t);

setTimeout(()=>{

t.remove();

},3000);

}

</script>

</body>
    </html>
