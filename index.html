<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATOM X PRO - P2P Desk</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .bg-binance-gray { background-color: #1e2329; }
        .bg-binance-dark { background-color: #181a20; }
        .border-binance { border-color: #2b3139; }
        .tab-active { border-bottom: 3px solid #f0b90b; color: #f0b90b; font-weight: bold; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col pb-20">

    <script>
        // የ Firebase መዋቅር
        const firebaseConfig = {
            authDomain: "atomx-exchange.firebaseapp.com",
            databaseURL: "https://atomx-exchange-default-rtdb.firebaseio.com", 
            projectId: "atomx-exchange",
            storageBucket: "atomx-exchange.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <header class="bg-binance-dark p-4 flex justify-between items-center border-b border-binance sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center font-bold text-black text-sm">X</div>
            <div>
                <h1 class="text-md font-bold tracking-wider">ATOM X <span class="text-xs bg-amber-500 text-black px-1 rounded font-black">PRO</span></h1>
                <p class="text-[10px] text-gray-400">Live P2P Trade Room</p>
            </div>
        </div>
        <div class="text-emerald-500 font-bold text-sm">ETB</div>
    </header>

    <section class="bg-binance-dark px-4 pt-2 flex justify-between items-center border-b border-binance">
        <div class="flex space-x-6 text-sm font-medium">
            <button id="buy-toggle-btn" onclick="filterTradeType('BUY')" class="pb-2 tab-active text-lg">Buy</button>
            <button id="sell-toggle-btn" onclick="filterTradeType('SELL')" class="pb-2 text-gray-400 text-lg">Sell</button>
        </div>
        <button onclick="openModal('post-modal')" class="bg-binance-gray text-amber-400 text-xs px-3 py-1.5 rounded-md border border-amber-500/30 flex items-center space-x-1 mb-2 hover:bg-amber-500 hover:text-black transition">
            <i class="fa-solid fa-plus text-[10px]"></i> <span>Add Post</span>
        </button>
    </section>

    <main class="flex-1 p-3 space-y-3 overflow-y-auto" id="main-content-area">
        <div id="p2p-posts-container" class="space-y-3">
            <div class="text-center py-10 text-gray-500 text-xs">🔒 Connecting to ATOM X Database...</div>
        </div>
    </main>

    <div id="orders-page" class="hidden flex-1 p-4 space-y-3">
        <h2 class="text-lg font-bold border-b border-binance pb-2">My Active Orders</h2>
        <div id="orders-container" class="space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-binance-dark border-t border-binance flex justify-around py-2.5 text-center text-xs z-50">
        <button onclick="switchTab('p2p-tab')" id="nav-p2p" class="flex flex-col items-center text-amber-400">
            <i class="fa-solid : right-left text-lg mb-1"></i>
            <span>P2P Desk</span>
        </button>
        <button onclick="switchTab('orders-tab')" id="nav-orders" class="flex flex-col items-center text-gray-400 hover:text-white">
            <i class="fa-solid : list-check text-lg mb-1"></i>
            <span>Orders Desk</span>
        </button>
    </nav>

    <div id="post-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-binance-dark w-full max-w-sm rounded-xl p-5 border border-binance space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b border-binance pb-2">
                <h3 class="font-bold text-md text-amber-400">Publish Advertisement</h3>
                <button onclick="closeModal('post-modal')" class="text-gray-400 text-lg">&times;</button>
            </div>
            <form id="p2p-form" onsubmit="handleFormSubmit(event)" class="space-y-3 text-xs">
                <div>
                    <label class="block text-gray-400 mb-1">Trade Type</label>
                    <select id="form-type" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                        <option value="BUY">BUY (USDT ሊገዛ የሚፈልግ)</option>
                        <option value="SELL">SELL (USDT ሊሸጥ የሚፈልግ)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Merchant Name</label>
                    <input type="text" id="form-name" required placeholder="e.g., Alazar_Crypto" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-400 mb-1">Price per 1 USDT</label>
                        <input type="number" step="0.01" id="form-price" required placeholder="125.50" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Total USDT</label>
                        <input type="number" step="0.01" id="form-crypto-amount" required placeholder="500" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-400 mb-1">Min Limit (ETB)</label>
                        <input type="number" id="form-min" required placeholder="1000" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Max Limit (ETB)</label>
                        <input type="number" id="form-max" required placeholder="50000" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Payment Method</label>
                    <select id="form-payment" class="w-full bg-binance-gray p-2.5 rounded border border-binance text-emerald-400 font-bold focus:outline-none">
                        <option value="Telebirr">Telebirr</option>
                        <option value="CBE Birr">Commercial Bank (CBE)</option>
                        <option value="BOA">Bank of Abyssinia</option>
                    </select>
                </div>
                <div class="p-3 bg-amber-500/5 rounded border border-amber-500/20 space-y-2">
                    <p class="text-[10px] text-amber-400 font-bold">⚠️ የክፍያ አካውንት መረጃ (ለገዢዎች የሚታይ)</p>
                    <div>
                        <label class="block text-gray-400 mb-0.5">Full Name (የአካውንቱ ሙሉ ስም)</label>
                        <input type="text" id="form-acc-name" required placeholder="e.g., Abebe Kebede" class="w-full bg-binance-gray p-2 rounded border border-binance text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-0.5">Account / Phone Number</label>
                        <input type="text" id="form-acc-number" required placeholder="e.g., 0912345678 or 1000..." class="w-full bg-binance-gray p-2 rounded border border-binance text-white focus:outline-none">
                    </div>
                </div>
                <button type="submit" class="w-full bg-amber-500 text-black py-2.5 font-bold rounded mt-2">Publish Advertisement</button>
            </form>
        </div>
    </div>

    <div id="trade-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-binance-dark w-full max-w-sm rounded-xl p-5 border border-binance space-y-4">
            <div class="flex justify-between items-center border-b border-binance pb-2">
                <h3 class="font-bold text-md text-white" id="trade-title">Trade USDT</h3>
                <button onclick="closeModal('trade-modal')" class="text-gray-400 text-lg">&times;</button>
            </div>
            <div class="space-y-3 text-xs">
                <div class="bg-binance-gray p-3 rounded space-y-1">
                    <div class="flex justify-between"><span class="text-gray-400">Merchant:</span> <span id="trade-merchant" class="font-bold text-amber-400"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Price:</span> <span id="trade-price" class="text-white font-bold"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Available:</span> <span id="trade-avail"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Method:</span> <span id="trade-pay-method" class="text-emerald-400 font-bold"></span></div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Enter Amount in ETB</label>
                    <input type="number" id="trade-input-amount" oninput="calculateCrypto()" placeholder="0.00" class="w-full bg-binance-gray p-3 rounded border border-binance text-white text-base font-bold focus:outline-none">
                    <p class="text-[10px] text-gray-500 mt-1" id="trade-limit-text"></p>
                </div>
                <div class="bg-binance-gray p-3 rounded flex justify-between items-center">
                    <span class="text-gray-400">You will receive/give:</span>
                    <span class="text-sm font-black text-amber-400" id="calculated-crypto">0.00 USDT</span>
                </div>
                <input type="hidden" id="current-post-id">
                <button onclick="confirmOrder()" id="trade-action-btn" class="w-full py-3 font-bold rounded text-sm text-black bg-emerald-500">Confirm Trade</button>
            </div>
        </div>
    </div>

    <script>
        let allPosts = [];
        let currentFilter = 'BUY';

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 🟢 Firebase ፖስቶችን ማዳመጫ
        database.ref('p2p_posts').on('value', (snapshot) => {
            allPosts = [];
            snapshot.forEach((childSnapshot) => {
                let item = childSnapshot.val();
                item.id = childSnapshot.key;
                allPosts.push(item);
            });
            allPosts.reverse();
            renderPosts();
        });

        // አዲስ ፖስት መላኪያ (ከባንክ መረጃ ጋር)
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const postData = {
                type: document.getElementById('form-type').value,
                name: document.getElementById('form-name').value,
                price: parseFloat(document.getElementById('form-price').value),
                cryptoAmount: parseFloat(document.getElementById('form-crypto-amount').value),
                minLimit: parseInt(document.getElementById('form-min').value),
                maxLimit: parseInt(document.getElementById('form-max').value),
                payment: document.getElementById('form-payment').value,
                accName: document.getElementById('form-acc-name').value,    // 🆕
                accNumber: document.getElementById('form-acc-number').value, // 🆕
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('p2p_posts').push(postData).then(() => {
                document.getElementById('p2p-form').reset();
                closeModal('post-modal');
            }).catch((err) => alert("Error: " + err.message));
        }

        function renderPosts() {
            const container = document.getElementById('p2p-posts-container');
            container.innerHTML = '';
            const filtered = allPosts.filter(p => p.type === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 text-xs">ምንም አይነት ንግድ አልተገኘም</div>`;
                return;
            }

            filtered.forEach(post => {
                const actionButtonColor = post.type === 'BUY' ? 'bg-emerald-500' : 'bg-rose-500 text-white';
                const actionButtonText = post.type === 'BUY' ? 'Buy' : 'Sell';

                container.innerHTML += `
                    <div class="bg-binance-gray p-4 rounded-xl border border-binance/50 space-y-3">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-2">
                                <div class="w-5 h-5 rounded-full bg-gray-700 flex items-center justify-center text-[10px] font-bold text-white">${post.name[0].toUpperCase()}</div>
                                <span class="font-bold text-sm text-gray-200">${post.name}</span>
                            </div>
                            <div class="text-[10px] bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded font-bold">${post.payment}</div>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-gray-400">Price</p>
                                <p class="text-xl font-black text-white">${post.price.toFixed(2)} <span class="text-xs text-amber-400">ETB</span></p>
                            </div>
                            <div class="text-right text-xs text-gray-400">
                                <p>Available: <span class="text-gray-200">${post.cryptoAmount} USDT</span></p>
                                <p>Limit: <span class="text-gray-200">${post.minLimit} - ${post.maxLimit} ETB</span></p>
                            </div>
                        </div>
                        <div class="flex justify-end pt-2 border-t border-binance/30">
                            <button onclick="openTradeDesk('${post.id}')" class="${actionButtonColor} text-black font-extrabold px-6 py-2 rounded-lg text-xs">
                                ${actionButtonText}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function filterTradeType(type) {
            currentFilter = type;
            document.getElementById('buy-toggle-btn').className = type === 'BUY' ? "pb-2 tab-active text-lg" : "pb-2 text-gray-400 text-lg";
            document.getElementById('sell-toggle-btn').className = type === 'SELL' ? "pb-2 tab-active text-lg" : "pb-2 text-gray-400 text-lg";
            renderPosts();
        }

        function openTradeDesk(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            document.getElementById('current-post-id').value = post.id;
            document.getElementById('trade-merchant').innerText = post.name;
            document.getElementById('trade-price').innerText = `${post.price.toFixed(2)} ETB`;
            document.getElementById('trade-avail').innerText = `${post.cryptoAmount} USDT`;
            document.getElementById('trade-pay-method').innerText = post.payment;
            document.getElementById('trade-limit-text').innerText = `Limit: ${post.minLimit} - ${post.maxLimit} ETB`;
            openModal('trade-modal');
        }

        function calculateCrypto() {
            const postId = document.getElementById('current-post-id').value;
            const post = allPosts.find(p => p.id === postId);
            const etbAmount = parseFloat(document.getElementById('trade-input-amount').value) || 0;
            document.getElementById('calculated-crypto').innerText = post && etbAmount > 0 ? `${(etbAmount / post.price).toFixed(2)} USDT` : '0.00 USDT';
        }

        // ኦርደር ማረጋገጫ (የባንክ መረጃዎችን ከፖስቱ ላይ ቀድቶ ወደ ኦርደሩ ያክላል)
        function confirmOrder() {
            const postId = document.getElementById('current-post-id').value;
            const post = allPosts.find(p => p.id === postId);
            const etbAmount = parseFloat(document.getElementById('trade-input-amount').value) || 0;

            if (!post || etbAmount < post.minLimit || etbAmount > post.maxLimit) {
                alert("እባክዎ ገደቡን ጠብቀው ያስገቡ!");
                return;
            }

            const orderData = {
                orderId: 'ATOM-' + Math.floor(Math.random() * 900000 + 100000),
                type: post.type,
                merchant: post.name,
                price: post.price,
                fiat: etbAmount,
                crypto: (etbAmount / post.price).toFixed(2),
                payment: post.payment,
                accName: post.accName || "Not Provided",     // 🆕
                accNumber: post.accNumber || "Not Provided", // 🆕
                status: 'PENDING',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('p2p_orders').push(orderData).then(() => {
                closeModal('trade-modal');
                switchTab('orders-tab');
            });
        }

        // 🆕 ክፍያ መፈጸሙን ለሻጭ ማሳወቂያ (Notify Seller)
        function notifySeller(orderKey) {
            database.ref('p2p_orders/' + orderKey).update({ status: 'PAID' })
                .then(() => alert("🚀 ክፍያ መፈጸምዎ ለሻጩ ተነግሯል! እባክዎ ሻጩ ክሪፕቶውን እስኪለቅ ይጠብቁ።"))
                .catch((err) => alert(err.message));
        }

        // ኦርደሮችን ከ Firebase አውጥቶ ማሳያ (ከቢናንስ የክፍያ ገጽ ጋር)
        database.ref('p2p_orders').on('value', (snapshot) => {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';
            
            if(!snapshot.exists()) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 text-xs">ምንም አይነት ትዕዛዝ የለም</div>`;
                return;
            }

            snapshot.forEach((child) => {
                const order = child.val();
                const orderKey = child.key;
                
                // የሁኔታ መግለጫ በተን (Status Button)
                let statusAction = '';
                if (order.status === 'PENDING') {
                    statusAction = `
                        <button onclick="notifySeller('${orderKey}')" class="w-full mt-2 bg-amber-500 text-black py-2 rounded text-xs font-black tracking-wide hover:bg-amber-400">
                            💳 Transferred, notify seller (ክፍያ ፈጽሜያለሁ አሳውቅ)
                        </button>
                    `;
                } else if (order.status === 'PAID') {
                    statusAction = `<div class="text-center py-2 mt-2 bg-amber-500/10 text-amber-400 font-bold rounded text-[11px]">🟢 Paid & Notified (ሻጩ እያረጋገጠ ነው)</div>`;
                }

                container.innerHTML += `
                    <div class="bg-binance-gray p-4 rounded-xl border border-binance space-y-3">
                        <div class="flex justify-between items-center text-xs border-b border-binance/30 pb-2">
                            <span class="font-mono text-gray-400 font-bold">${order.orderId}</span>
                            <span class="px-2 py-0.5 rounded font-bold ${order.type === 'BUY' ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-400 bg-rose-500/10'}">${order.type}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div>
                                <p class="text-gray-400 text-[10px]">Fiat Amount</p>
                                <p class="text-base font-black text-white">${order.fiat.toFixed(2)} ETB</p>
                            </div>
                            <div class="text-right">
                                <p class="text-gray-400 text-[10px]">Crypto Amount</p>
                                <p class="text-base font-black text-amber-400">${order.crypto} USDT</p>
                            </div>
                        </div>

                        <div class="p-3 bg-binance-dark rounded-lg border border-binance space-y-1.5 text-[11px]">
                            <p class="text-[10px] text-emerald-400 font-bold flex justify-between">
                                <span>🏛 የክፍያ ዝርዝር (Payment Desk)</span>
                                <span class="bg-emerald-500/10 px-1 rounded">${order.payment}</span>
                            </p>
                            <div class="flex justify-between"><span class="text-gray-400">Account Name:</span> <span class="text-white font-medium">${order.accName}</span></div>
                            <div class="flex justify-between"><span class="text-gray-400">Acc / Phone Number:</span> <span class="text-amber-400 font-bold select-all">${order.accNumber}</span></div>
                        </div>

                        ${statusAction}
                    </div>
                `;
            });
        });

        function switchTab(tabId) {
            document.getElementById('main-content-area').classList.toggle('hidden', tabId !== 'p2p-tab');
            document.getElementById('orders-page').classList.toggle('hidden', tabId !== 'orders-tab');
            document.getElementById('nav-p2p').className = tabId === 'p2p-tab' ? "flex flex-col items-center text-amber-400" : "flex flex-col items-center text-gray-400";
            document.getElementById('nav-orders').className = tabId === 'orders-tab' ? "flex flex-col items-center text-amber-400" : "flex flex-col items-center text-gray-400";
        }
    </script>
</body>
    </html>
