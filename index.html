<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ATOM X P2P</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
--bg:#0b0e11;
--card:#1e2329;
--border:#2b3139;
--yellow:#FCD535;
--green:#0ECB81;
--red:#F6465D;
--text:#EAECEF;
--muted:#848E9C;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
-webkit-tap-highlight-color:transparent;
}

.tab-content{
display:none;
animation:fade .25s ease;
padding-bottom:110px;
}

.tab-content.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

input,select{
background:#11161c!important;
border:1px solid var(--border)!important;
color:white!important;
outline:none!important;
}

input:focus,
select:focus{
border-color:var(--yellow)!important;
}

.nav-item{
color:#777;
transition:.2s;
}

.nav-item.active{
color:white;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
}

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#333;
}

</style>
</head>

<body>

<!-- TOAST -->
<div id="toastBox"
class="fixed top-4 left-1/2 -translate-x-1/2 z-[99999] space-y-2">
</div>

<!-- BANNED -->
<div id="bannedScreen"
class="hidden fixed inset-0 bg-black z-[999999] flex flex-col items-center justify-center text-center p-6">

<i class="fa-solid fa-ban text-6xl text-red-500 mb-4"></i>

<h1 class="text-3xl font-black">
Account Suspended
</h1>

<p class="text-gray-400 mt-3">
Your account has been banned.
</p>

</div>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-[#0b0e11] border-b border-[#2b3139] px-4 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<div class="bg-[#FCD535] text-black font-black px-2 py-1 rounded-lg">
AX
</div>

<div>

<h1 class="font-black text-lg">
ATOM X
</h1>

<p class="text-[10px] text-gray-400">
P2P Exchange
</p>

</div>

</div>

<div class="flex items-center gap-3">

<div class="bg-[#1e2329] border border-[#2b3139] px-3 py-2 rounded-xl text-sm">
ETB
</div>

<button>
<i class="fa-regular fa-bell text-xl text-[#848E9C]"></i>
</button>

</div>

</header>

<!-- HOME -->
<section id="home-view"
class="tab-content active p-4 space-y-5">

<!-- BALANCE -->
<div class="card p-5">

<div class="flex justify-between items-start">

<div>

<p class="text-sm text-gray-400">
Estimated Balance
</p>

<h1 class="text-4xl font-black mt-2">
0.00
<span class="text-xl">
USDT
</span>
</h1>

</div>

<div class="bg-[#0ECB81]/10 text-[#0ECB81] px-3 py-2 rounded-xl text-sm font-bold">
P2P ACTIVE
</div>

</div>

<div class="grid grid-cols-3 gap-3 mt-6">

<div class="bg-[#11161c] rounded-xl p-3 text-center">
<p class="text-xs text-gray-400">
Trades
</p>
<h2 class="font-black text-lg mt-1">
0
</h2>
</div>

<div class="bg-[#11161c] rounded-xl p-3 text-center">
<p class="text-xs text-gray-400">
Orders
</p>
<h2 class="font-black text-lg mt-1">
0
</h2>
</div>

<div class="bg-[#11161c] rounded-xl p-3 text-center">
<p class="text-xs text-gray-400">
Rate
</p>
<h2 class="font-black text-lg mt-1 text-[#0ECB81]">
100%
</h2>
</div>

</div>

</div>

<!-- MARKET -->
<div>

<div class="flex justify-between items-center mb-4">

<h1 class="text-2xl font-black">
P2P Market
</h1>

<div class="flex bg-[#1e2329] rounded-xl p-1">

<button onclick="setMarket('buy')"
id="btnBuy"
class="px-4 py-2 rounded-lg bg-[#0ECB81] text-white text-sm font-bold">
Buy
</button>

<button onclick="setMarket('sell')"
id="btnSell"
class="px-4 py-2 rounded-lg text-gray-400 text-sm font-bold">
Sell
</button>

</div>

</div>

<div id="marketList"
class="space-y-3">
</div>

</div>

</section>

<!-- ORDERS -->
<section id="orders-view"
class="tab-content p-4">

<h1 class="text-2xl font-black mb-5">
My Orders
</h1>

<div id="ordersList"
class="space-y-3">
</div>

</section>

<!-- POST -->
<section id="post-view"
class="tab-content p-4">

<h1 class="text-2xl font-black mb-5">
Post Advertisement
</h1>

<div class="card p-5 space-y-5">

<div class="flex bg-[#11161c] p-1 rounded-xl">

<button onclick="setForm('buy')"
id="formBuy"
class="flex-1 py-3 rounded-lg bg-[#0ECB81] font-black">
Buy
</button>

<button onclick="setForm('sell')"
id="formSell"
class="flex-1 py-3 rounded-lg text-gray-400 font-black">
Sell
</button>

</div>

<input type="hidden" id="adType" value="buy">

<div>

<label class="text-sm text-gray-400 block mb-2">
Price (ETB)
</label>

<input type="number"
id="price"
placeholder="125.50"
class="w-full p-4 rounded-xl">

</div>

<div>

<label class="text-sm text-gray-400 block mb-2">
Amount (USDT)
</label>

<input type="number"
id="amount"
placeholder="100"
class="w-full p-4 rounded-xl">

</div>

<button onclick="publishAd()"
class="w-full bg-[#FCD535] text-black py-4 rounded-xl font-black text-lg">
POST AD
</button>

</div>

</section>

<!-- PROFILE -->
<section id="profile-view"
class="tab-content p-4 space-y-5">

<div class="flex items-center gap-4">

<div id="avatar"
class="w-20 h-20 rounded-full bg-[#2b3139] border-2 border-[#FCD535] flex items-center justify-center text-3xl font-black">
A
</div>

<div>

<h1 id="username"
class="text-2xl font-black">
Loading...
</h1>

<div class="flex gap-2 mt-2">

<span id="userStatus"
class="bg-[#2b3139] px-3 py-1 rounded-lg text-xs font-bold">
UNVERIFIED
</span>

<span class="bg-[#1e2329] border border-[#2b3139] px-3 py-1 rounded-lg text-xs">
ID:
<span id="userId"></span>
</span>

</div>

</div>

</div>

<!-- VERIFY -->
<div class="card p-5">

<div class="flex justify-between items-center mb-4">

<h1 class="text-xl font-black">
Identity Verification
</h1>

<i class="fa-solid fa-shield-halved text-[#FCD535] text-2xl"></i>

</div>

<div id="verifyArea">

<button onclick="document.getElementById('kycInput').click()"
class="w-full bg-[#FCD535] text-black py-4 rounded-xl font-black">

VERIFY ACCOUNT

</button>

<input type="file"
id="kycInput"
class="hidden"
accept="image/*"
onchange="uploadKYC(this)">

</div>

</div>

<!-- PAYMENT -->
<div class="card p-5 space-y-4">

<h1 class="text-xl font-black">
Payment Methods
</h1>

<input type="text"
id="telebirrPhone"
placeholder="Telebirr Phone"
class="w-full p-4 rounded-xl">

<input type="text"
id="telebirrName"
placeholder="Telebirr Name"
class="w-full p-4 rounded-xl">

<input type="text"
id="binancePay"
placeholder="Binance Pay ID"
class="w-full p-4 rounded-xl">

<button onclick="saveProfile()"
class="w-full bg-[#FCD535] text-black py-4 rounded-xl font-black">

SAVE SETTINGS

</button>

</div>

</section>

<!-- ADMIN -->
<section id="admin-view"
class="tab-content p-4">

<div class="flex items-center gap-2 mb-5">

<i class="fa-solid fa-crown text-red-500 text-2xl"></i>

<h1 class="text-2xl font-black text-red-500">
SUPER ADMIN
</h1>

</div>

<div id="adminUsers"
class="space-y-3">
</div>

</section>

<!-- NAVIGATION -->
<nav class="fixed bottom-0 left-0 w-full bg-[#0b0e11] border-t border-[#2b3139] flex justify-around py-3 z-50">

<button onclick="switchTab('home')"
id="nav-home"
class="nav-item active flex flex-col items-center">

<i class="fa-solid fa-chart-line text-xl"></i>

<span class="text-xs mt-1">
Home
</span>

</button>

<button onclick="switchTab('orders')"
id="nav-orders"
class="nav-item flex flex-col items-center">

<i class="fa-solid fa-file-invoice text-xl"></i>

<span class="text-xs mt-1">
Orders
</span>

</button>

<button onclick="switchTab('post')"
id="nav-post"
class="nav-item flex flex-col items-center">

<div class="w-14 h-14 rounded-full bg-[#FCD535] text-black flex items-center justify-center -mt-8 shadow-lg">
<i class="fa-solid fa-plus text-xl"></i>
</div>

<span class="text-xs mt-1">
Post
</span>

</button>

<button onclick="switchTab('profile')"
id="nav-profile"
class="nav-item flex flex-col items-center">

<i class="fa-regular fa-user text-xl"></i>

<span class="text-xs mt-1">
Profile
</span>

</button>

<button onclick="switchTab('admin')"
id="nav-admin"
class="hidden nav-item flex-col items-center text-red-500">

<i class="fa-solid fa-shield-halved text-xl"></i>

<span class="text-xs mt-1">
Admin
</span>

</button>

</nav>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyD3getH9kSW2oHuOI9AZR8t4yZ34_jPZG0",

authDomain: "atomx-pro.firebaseapp.com",

databaseURL: "https://atomx-pro-default-rtdb.firebaseio.com",

projectId: "atomx-pro",

storageBucket: "atomx-pro.appspot.com",

messagingSenderId: "123456789",

appId: "1:123456:web:abc"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* TELEGRAM */

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe?.user || {

id:"7798504269",

first_name:"Admin"

};

const ADMIN_ID = "7798504269";

/* GLOBAL */

let currentMarket = "buy";

let myData = {};

const adsRef = db.ref("ads");

const ordersRef = db.ref("orders");

/* START */

window.onload = ()=>{

document.getElementById("userId").innerText = user.id;

if(String(user.id) === ADMIN_ID){

document.getElementById("nav-admin")
.classList.remove("hidden");

document.getElementById("nav-admin")
.classList.add("flex");

}

initUser();

loadMarket();

listenOrders();

};

/* TOAST */

function toast(msg){

const t = document.createElement("div");

t.className =
"bg-[#1e2329] border border-[#2b3139] px-4 py-3 rounded-xl text-sm font-bold";

t.innerText = msg;

document.getElementById("toastBox")
.appendChild(t);

setTimeout(()=>{

t.remove();

},3000);

}

/* TABS */

function switchTab(tab){

document.querySelectorAll(".tab-content")
.forEach(e=>e.classList.remove("active"));

document.querySelectorAll(".nav-item")
.forEach(e=>e.classList.remove("active"));

document.getElementById(tab + "-view")
.classList.add("active");

document.getElementById("nav-" + tab)
.classList.add("active");

if(tab === "admin"){

loadAdmin();

}

}

/* USER */

function initUser(){

db.ref("users/" + user.id)
.on("value",snap=>{

myData = snap.val();

if(!myData){

db.ref("users/" + user.id)
.set({

name:user.first_name,

status:"unverified",

isBanned:false,

createdAt:Date.now()

});

return;

}

if(myData.isBanned){

document.getElementById("bannedScreen")
.classList.remove("hidden");

return;

}

updateProfile();

});

}

function updateProfile(){

document.getElementById("username")
.innerText = myData.name || "Unknown";

document.getElementById("avatar")
.innerText =
(myData.name || "U")
.charAt(0)
.toUpperCase();

const status =
document.getElementById("userStatus");

const verifyArea =
document.getElementById("verifyArea");

if(myData.status === "verified"){

status.innerText = "VERIFIED";

status.className =
"bg-[#0ECB81]/10 text-[#0ECB81] px-3 py-1 rounded-lg text-xs font-black";

verifyArea.innerHTML = `

<div class="bg-[#0ECB81]/10 border border-[#0ECB81] text-[#0ECB81] py-4 rounded-xl text-center font-black">

<i class="fa-solid fa-circle-check mr-2"></i>

ACCOUNT VERIFIED

</div>

`;

}else if(myData.status === "pending"){

status.innerText = "PENDING";

status.className =
"bg-yellow-500/10 text-yellow-400 px-3 py-1 rounded-lg text-xs font-black";

verifyArea.innerHTML = `

<div class="bg-yellow-500/10 border border-yellow-500 text-yellow-400 py-4 rounded-xl text-center font-black">

<i class="fa-solid fa-clock mr-2"></i>

VERIFICATION PENDING

</div>

`;

}

document.getElementById("telebirrPhone")
.value = myData.telebirrPhone || "";

document.getElementById("telebirrName")
.value = myData.telebirrName || "";

document.getElementById("binancePay")
.value = myData.binancePay || "";

}

function uploadKYC(input){

if(input.files && input.files[0]){

const reader = new FileReader();

reader.onload = e=>{

db.ref("users/" + user.id)
.update({

status:"pending",

kyc:e.target.result

});

toast("KYC Submitted");

};

reader.readAsDataURL(input.files[0]);

}

}

function saveProfile(){

db.ref("users/" + user.id)
.update({

telebirrPhone:
document.getElementById("telebirrPhone").value,

telebirrName:
document.getElementById("telebirrName").value,

binancePay:
document.getElementById("binancePay").value

});

toast("Saved");

}

/* MARKET */

function setMarket(type){

currentMarket = type;

if(type === "buy"){

document.getElementById("btnBuy")
.className =
"px-4 py-2 rounded-lg bg-[#0ECB81] text-white text-sm font-bold";

document.getElementById("btnSell")
.className =
"px-4 py-2 rounded-lg text-gray-400 text-sm font-bold";

}else{

document.getElementById("btnSell")
.className =
"px-4 py-2 rounded-lg bg-[#F6465D] text-white text-sm font-bold";

document.getElementById("btnBuy")
.className =
"px-4 py-2 rounded-lg text-gray-400 text-sm font-bold";

}

loadMarket();

}

function setForm(type){

document.getElementById("adType").value = type;

if(type === "buy"){

document.getElementById("formBuy")
.className =
"flex-1 py-3 rounded-lg bg-[#0ECB81] font-black";

document.getElementById("formSell")
.className =
"flex-1 py-3 rounded-lg text-gray-400 font-black";

}else{

document.getElementById("formSell")
.className =
"flex-1 py-3 rounded-lg bg-[#F6465D] font-black";

document.getElementById("formBuy")
.className =
"flex-1 py-3 rounded-lg text-gray-400 font-black";

}

}

function publishAd(){

const price =
document.getElementById("price").value;

const amount =
document.getElementById("amount").value;

const type =
document.getElementById("adType").value;

if(!price || !amount){

toast("Enter data");

return;

}

db.ref("ads")
.push({

uid:user.id,

name:myData.name,

price:Number(price),

amount:Number(amount),

type:type,

status:"active",

createdAt:Date.now()

});

toast("Advertisement Published");

document.getElementById("price").value = "";

document.getElementById("amount").value = "";

switchTab("home");

}

function loadMarket(){

adsRef.off();

adsRef.on("value",snap=>{

const ads = snap.val() || {};

const box =
document.getElementById("marketList");

let html = "";

Object.keys(ads).forEach(id=>{

const ad = ads[id];

if(ad.uid == user.id) return;

if(ad.status !== "active") return;

if(ad.type !== currentMarket){

const btn =
currentMarket === "buy"
? "BUY"
: "SELL";

const color =
currentMarket === "buy"
? "bg-[#0ECB81]"
: "bg-[#F6465D]";

html += `

<div class="card p-4">

<div class="flex justify-between items-center mb-4">

<div class="flex items-center gap-3">

<div class="w-12 h-12 rounded-full bg-[#2b3139] flex items-center justify-center font-black">

${ad.name.charAt(0)}

</div>

<div>

<h1 class="font-black">
${ad.name}
</h1>

<p class="text-xs text-gray-400">
Verified Merchant
</p>

</div>

</div>

<div class="text-right">

<h1 class="text-2xl font-black">
${ad.price}
</h1>

<p class="text-xs text-gray-400">
ETB
</p>

</div>

</div>

<div class="flex justify-between items-center">

<div>

<p class="text-sm text-gray-400">
Available
</p>

<h2 class="font-black">
${ad.amount} USDT
</h2>

</div>

<button onclick="createOrder('${id}','${ad.uid}',${ad.price},${ad.amount})"
class="${color} px-6 py-3 rounded-xl font-black">

${btn}

</button>

</div>

</div>

`;

}

});

box.innerHTML = html;

});

}

/* ORDER */

function createOrder(adId,sellerId,price,amount){

if(sellerId == user.id){

toast("You cannot trade yourself");

return;

}

ordersRef.push({

buyerId:user.id,

sellerId:sellerId,

amountUsdt:amount,

amountEtb:amount * price,

status:"pending",

createdAt:Date.now()

});

db.ref("ads/" + adId)
.update({

status:"completed"

});

toast("Order Created");

}

function listenOrders(){

ordersRef.on("value",snap=>{

const data = snap.val() || {};

const box =
document.getElementById("ordersList");

let html = "";

Object.keys(data).forEach(id=>{

const o = data[id];

if(
o.buyerId == user.id ||
o.sellerId == user.id
){

html += `

<div class="card p-4">

<div class="flex justify-between items-center">

<div>

<h1 class="font-black text-lg">
${o.amountUsdt} USDT
</h1>

<p class="text-sm text-gray-400">
${o.amountEtb} ETB
</p>

</div>

<div class="bg-[#11161c] px-3 py-2 rounded-xl text-sm uppercase">

${o.status}

</div>

</div>

</div>

`;

}

});

box.innerHTML = html;

});

}

/* ADMIN */

function loadAdmin(){

db.ref("users")
.on("value",snap=>{

const users = snap.val() || {};

const box =
document.getElementById("adminUsers");

let html = "";

Object.keys(users).forEach(id=>{

const u = users[id];

const btn = u.isBanned

? `<button onclick="banUser('${id}',false)"
class="bg-gray-600 px-3 py-2 rounded-xl text-xs font-black">
UNBAN
</button>`

: `<button onclick="banUser('${id}',true)"
class="bg-red-500 px-3 py-2 rounded-xl text-xs font-black">
BAN
</button>`;

html += `

<div class="card p-4 flex justify-between items-center">

<div>

<h1 class="font-black">
${u.name}
</h1>

<p class="text-xs text-gray-400">
${id}
</p>

</div>

${id !== ADMIN_ID ? btn : '<span class="text-yellow-400 text-xs">ROOT ADMIN</span>'}

</div>

`;

});

box.innerHTML = html;

});

}

function banUser(uid,state){

db.ref("users/" + uid)
.update({

isBanned:state

});

toast(state ? "User Banned" : "User Unbanned");

}

</script>

</body>
</html>
