<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>ATOM X P2P</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
--bg:#0b0e11;
--card:#1e2329;
--border:#2b3139;
--yellow:#FCD535;
--green:#0ECB81;
--red:#F6465D;
--text:#EAECEF;
--muted:#848E9C;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
-webkit-tap-highlight-color:transparent;
}

.tab-content{
display:none;
animation:fade .25s ease;
}

.tab-content.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

input,select{
background:var(--bg)!important;
border:1px solid var(--border)!important;
color:white!important;
outline:none;
}

input:focus,
select:focus{
border-color:var(--yellow)!important;
}

.nav-item{
color:var(--muted);
}

.nav-item.active{
color:white;
}

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:#333;
}

</style>
</head>

<body class="pb-24">

<!-- TOAST -->
<div id="toastBox"
class="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] space-y-2">
</div>

<!-- BANNED -->
<div id="bannedScreen"
class="hidden fixed inset-0 bg-black z-[99999] flex flex-col items-center justify-center p-5 text-center">

<i class="fa-solid fa-ban text-6xl text-red-500 mb-4"></i>

<h1 class="text-2xl font-bold">
Account Suspended
</h1>

<p class="text-gray-400 text-sm mt-2">
You are banned by administrator.
</p>

</div>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-[#0b0e11] border-b border-[#2b3139] p-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<div class="bg-[#FCD535] text-black font-black px-2 py-1 rounded text-xs">
AX
</div>

<h1 class="font-bold">
P2P
</h1>
</div>

<div class="flex gap-3 items-center">

<div class="bg-[#1e2329] px-3 py-1 rounded-lg text-sm border border-[#2b3139]">
ETB
</div>

<button onclick="openModal('notificationModal')">
<i class="fa-regular fa-bell text-lg text-[#848E9C]"></i>
</button>

</div>
</header>

<!-- MARKET -->
<section id="market-view"
class="tab-content active p-3">

<div class="flex gap-4 mb-4 text-lg font-bold">

<button onclick="setMarket('buy')"
id="btn-buy"
class="border-b-2 border-[#FCD535] pb-1">
Buy
</button>

<button onclick="setMarket('sell')"
id="btn-sell"
class="text-gray-500 pb-1">
Sell
</button>

</div>

<div id="market-list"
class="space-y-3">
</div>

</section>

<!-- ORDERS -->
<section id="orders-view"
class="tab-content p-4">

<h1 class="text-xl font-bold mb-4">
Orders
</h1>

<div id="orders-list"
class="space-y-3">
</div>

</section>

<!-- POST -->
<section id="post-view"
class="tab-content p-4 space-y-5">

<h1 class="text-xl font-bold">
Post Ad
</h1>

<div class="bg-[#1e2329] p-5 rounded-xl border border-[#2b3139] space-y-4">

<div class="flex bg-black rounded-lg p-1">

<button onclick="setForm('buy')"
id="f-buy"
class="flex-1 py-2 rounded bg-[#0ECB81] text-white font-bold">
Buy
</button>

<button onclick="setForm('sell')"
id="f-sell"
class="flex-1 py-2 rounded text-gray-400 font-bold">
Sell
</button>

</div>

<input type="hidden" id="ad-type" value="buy"/>

<div>

<label class="text-xs text-gray-400 block mb-1">
Price
</label>

<input type="number"
id="ad-price"
placeholder="125.50"
class="w-full p-3 rounded-lg"/>

</div>

<div>

<label class="text-xs text-gray-400 block mb-1">
Amount USDT
</label>

<input type="number"
id="ad-amount"
placeholder="100"
class="w-full p-3 rounded-lg"/>

</div>

<button onclick="publishAd()"
class="w-full bg-[#FCD535] text-black py-3 rounded-lg font-black">
POST AD
</button>

</div>

</section>

<!-- PROFILE -->
<section id="profile-view"
class="tab-content p-4 space-y-5">

<div class="flex items-center gap-4">

<div id="avatar"
class="w-14 h-14 rounded-full bg-[#2b3139] flex items-center justify-center font-black text-xl border-2 border-[#FCD535]">
A
</div>

<div>

<h1 id="name"
class="font-bold text-lg">
Loading...
</h1>

<div class="flex gap-2 mt-1">

<span id="status"
class="text-[10px] bg-[#2b3139] px-2 py-1 rounded">
UNVERIFIED
</span>

<span class="text-[10px] bg-[#1e2329] border border-[#2b3139] px-2 py-1 rounded">
ID:
<span id="uid"></span>
</span>

</div>

</div>

</div>

<div class="bg-[#1e2329] p-4 rounded-xl border border-[#2b3139]">

<h2 class="font-bold mb-3">
Payment Method
</h2>

<div class="space-y-3">

<input type="text"
id="telePhone"
placeholder="Telebirr Phone"
class="w-full p-3 rounded-lg"/>

<input type="text"
id="teleName"
placeholder="Telebirr Name"
class="w-full p-3 rounded-lg"/>

<input type="text"
id="binanceId"
placeholder="Binance Pay ID"
class="w-full p-3 rounded-lg"/>

<button onclick="saveProfile()"
class="w-full bg-[#FCD535] text-black py-3 rounded-lg font-bold">
SAVE
</button>

</div>

</div>

</section>

<!-- ADMIN -->
<section id="admin-view"
class="tab-content p-4">

<h1 class="text-red-500 font-black text-xl mb-4">
SUPER ADMIN
</h1>

<div id="admin-users"
class="space-y-3">
</div>

</section>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 w-full bg-[#0b0e11] border-t border-[#2b3139] flex justify-around py-3 z-50">

<button onclick="switchTab('market')"
id="nav-market"
class="nav-item active flex flex-col items-center text-xs">

<i class="fa-solid fa-chart-line text-lg"></i>

Home

</button>

<button onclick="switchTab('orders')"
id="nav-orders"
class="nav-item flex flex-col items-center text-xs">

<i class="fa-solid fa-file text-lg"></i>

Orders

</button>

<button onclick="switchTab('post')"
id="nav-post"
class="nav-item flex flex-col items-center text-xs">

<div class="w-10 h-10 rounded-full bg-[#FCD535] text-black flex items-center justify-center -mt-5">
<i class="fa-solid fa-plus"></i>
</div>

Post

</button>

<button onclick="switchTab('profile')"
id="nav-profile"
class="nav-item flex flex-col items-center text-xs">

<i class="fa-regular fa-user text-lg"></i>

Profile

</button>

<button onclick="switchTab('admin')"
id="nav-admin"
class="hidden nav-item flex-col items-center text-xs text-red-500">

<i class="fa-solid fa-shield-halved text-lg"></i>

Admin

</button>

</nav>

<!-- NOTIFICATION MODAL -->
<div id="notificationModal"
class="hidden fixed inset-0 bg-black/70 z-[100] items-center justify-center p-5">

<div class="bg-[#1e2329] w-full max-w-sm rounded-2xl p-5 border border-[#2b3139]">

<div class="flex justify-between items-center mb-4">

<h2 class="font-bold text-lg">
Notifications
</h2>

<button onclick="closeModal('notificationModal')">
<i class="fa-solid fa-xmark"></i>
</button>

</div>

<p class="text-sm text-gray-400">
No new notifications.
</p>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyD3getH9kSW2oHuOI9AZR8t4yZ34_jPZG0",

authDomain: "atomx-pro.firebaseapp.com",

databaseURL: "https://atomx-pro-default-rtdb.firebaseio.com",

projectId: "atomx-pro",

storageBucket: "atomx-pro.appspot.com",

messagingSenderId: "123456789",

appId: "1:123456789:web:abc123"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* TELEGRAM */

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe?.user || {
id: "11223344",
first_name: "Guest"
};

const ADMIN_ID = "7798504269";

/* GLOBAL */

let currentMarket = "buy";

let myData = {};

const adsRef = db.ref("ads");

const ordersRef = db.ref("orders");

/* START */

window.onload = () => {

document.getElementById("uid").innerText = user.id;

if(String(user.id) === ADMIN_ID){

document.getElementById("nav-admin")
.classList.remove("hidden");

document.getElementById("nav-admin")
.classList.add("flex");

}

initUser();

loadAds();

listenOrders();

};

/* TOAST */

function toast(msg){

const div = document.createElement("div");

div.className =
"bg-[#1e2329] border border-[#2b3139] px-4 py-3 rounded-lg text-sm font-bold";

div.innerText = msg;

document.getElementById("toastBox")
.appendChild(div);

setTimeout(()=>{

div.remove();

},3000);

}

/* NAV */

function switchTab(tab){

document.querySelectorAll(".tab-content")
.forEach(e=>e.classList.remove("active"));

document.querySelectorAll(".nav-item")
.forEach(e=>e.classList.remove("active"));

document.getElementById(tab + "-view")
.classList.add("active");

document.getElementById("nav-" + tab)
.classList.add("active");

if(tab === "admin"){

loadAdmin();

}

}

/* MODAL */

function openModal(id){

const el = document.getElementById(id);

el.classList.remove("hidden");

el.classList.add("flex");

}

function closeModal(id){

const el = document.getElementById(id);

el.classList.add("hidden");

el.classList.remove("flex");

}

/* USER */

function initUser(){

db.ref("users/" + user.id)
.on("value",snap=>{

myData = snap.val();

if(!myData){

db.ref("users/" + user.id)
.set({

name:user.first_name,

status:"unverified",

isBanned:false

});

return;

}

if(myData.isBanned){

document.getElementById("bannedScreen")
.classList.remove("hidden");

return;

}

updateProfile();

});

}

function updateProfile(){

document.getElementById("name")
.innerText = myData.name;

document.getElementById("avatar")
.innerText = myData.name.charAt(0);

document.getElementById("status")
.innerText = myData.status.toUpperCase();

document.getElementById("telePhone")
.value = myData.telePhone || "";

document.getElementById("teleName")
.value = myData.teleName || "";

document.getElementById("binanceId")
.value = myData.binanceId || "";

}

function saveProfile(){

db.ref("users/" + user.id)
.update({

telePhone:
document.getElementById("telePhone").value,

teleName:
document.getElementById("teleName").value,

binanceId:
document.getElementById("binanceId").value

});

toast("Saved");

}

/* MARKET */

function setMarket(type){

currentMarket = type;

if(type === "buy"){

document.getElementById("btn-buy")
.className =
"border-b-2 border-[#FCD535] pb-1";

document.getElementById("btn-sell")
.className =
"text-gray-500 pb-1";

}else{

document.getElementById("btn-sell")
.className =
"border-b-2 border-[#FCD535] pb-1";

document.getElementById("btn-buy")
.className =
"text-gray-500 pb-1";

}

loadAds();

}

function setForm(type){

document.getElementById("ad-type").value = type;

if(type === "buy"){

document.getElementById("f-buy")
.className =
"flex-1 py-2 rounded bg-[#0ECB81] text-white font-bold";

document.getElementById("f-sell")
.className =
"flex-1 py-2 rounded text-gray-400 font-bold";

}else{

document.getElementById("f-sell")
.className =
"flex-1 py-2 rounded bg-[#F6465D] text-white font-bold";

document.getElementById("f-buy")
.className =
"flex-1 py-2 rounded text-gray-400 font-bold";

}

}

function publishAd(){

const price =
document.getElementById("ad-price").value;

const amount =
document.getElementById("ad-amount").value;

const type =
document.getElementById("ad-type").value;

if(!price || !amount){

toast("Enter data");

return;

}

db.ref("ads")
.push({

uid:user.id,

name:myData.name,

type:type,

price:Number(price),

amount:Number(amount),

status:"active"

});

toast("Ad Published");

document.getElementById("ad-price").value = "";

document.getElementById("ad-amount").value = "";

switchTab("market");

}

function loadAds(){

adsRef.off();

adsRef.on("value",snap=>{

const ads = snap.val() || {};

const box =
document.getElementById("market-list");

box.innerHTML = "";

Object.keys(ads).forEach(id=>{

const ad = ads[id];

if(ad.uid == user.id) return;

if(ad.status !== "active") return;

if(ad.type !== currentMarket){

const color =
currentMarket === "buy"
? "bg-[#0ECB81]"
: "bg-[#F6465D]";

const txt =
currentMarket === "buy"
? "BUY"
: "SELL";

box.innerHTML += `

<div class="bg-[#1e2329] p-4 rounded-xl border border-[#2b3139]">

<div class="flex justify-between mb-3">

<div>

<h2 class="font-bold">
${ad.name}
</h2>

<p class="text-xs text-gray-400">
${ad.amount} USDT
</p>

</div>

<div class="text-right">

<p class="text-xl font-black">
${ad.price}
</p>

<p class="text-xs text-gray-400">
ETB
</p>

</div>

</div>

<button onclick="createOrder('${id}','${ad.uid}',${ad.price},${ad.amount})"
class="${color} w-full py-3 rounded-lg font-bold">

${txt}

</button>

</div>

`;

}

});

});

}

/* ORDERS */

function createOrder(adId,sellerId,price,amount){

const ref = ordersRef.push();

ref.set({

buyerId:user.id,

sellerId:sellerId,

amountUsdt:amount,

amountEtb:amount*price,

status:"pending",

timestamp:Date.now()

});

db.ref("ads/" + adId)
.update({

status:"completed"

});

toast("Order Created");

}

function listenOrders(){

ordersRef.on("value",snap=>{

const data = snap.val() || {};

const box =
document.getElementById("orders-list");

let html = "";

Object.keys(data).forEach(id=>{

const o = data[id];

if(
o.buyerId == user.id ||
o.sellerId == user.id
){

html += `

<div class="bg-[#1e2329] border border-[#2b3139] p-4 rounded-xl">

<div class="flex justify-between">

<div>

<p class="font-bold">
${o.amountUsdt} USDT
</p>

<p class="text-xs text-gray-400">
${o.amountEtb} ETB
</p>

</div>

<span class="text-xs bg-[#2b3139] px-2 py-1 rounded uppercase">
${o.status}
</span>

</div>

</div>

`;

}

});

box.innerHTML = html;

});

}

/* ADMIN */

function loadAdmin(){

db.ref("users")
.on("value",snap=>{

const users = snap.val() || {};

const box =
document.getElementById("admin-users");

let html = "";

Object.keys(users).forEach(id=>{

const u = users[id];

const btn = u.isBanned

? `<button onclick="banUser('${id}',false)"
class="bg-gray-600 px-3 py-1 rounded text-xs">
UNBAN
</button>`

: `<button onclick="banUser('${id}',true)"
class="bg-red-500 px-3 py-1 rounded text-xs">
BAN
</button>`;

html += `

<div class="bg-[#1e2329] p-3 rounded-xl border border-[#2b3139] flex justify-between items-center">

<div>

<h2 class="font-bold text-sm">
${u.name}
</h2>

<p class="text-[10px] text-gray-400">
${id}
</p>

</div>

${id !== ADMIN_ID ? btn : '<span class="text-yellow-500 text-xs">ROOT</span>'}

</div>

`;

});

box.innerHTML = html;

});

}

function banUser(uid,state){

db.ref("users/" + uid)
.update({

isBanned:state

});

toast(state ? "User Banned" : "User Unbanned");

}

</script>

</body>
    </html>
