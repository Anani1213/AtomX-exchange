<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomX Pro P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .bg-card { background-color: #1e2329; }
        .text-yellow-ax { color: #f3ba2f; }
        .bg-yellow-ax { background-color: #f3ba2f; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #f3ba2f; }
        .active-tab-border { border-bottom: 2px solid #f3ba2f; color: #f3ba2f; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-[#0b0e11] z-50">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-ax w-8 h-8 rounded flex items-center justify-center font-black italic text-sm">AX</div>
            <h1 class="text-md font-bold uppercase tracking-widest">AtomX Pro</h1>
        </div>
        <div id="header-status" class="bg-gray-800 text-[10px] px-2 py-1 rounded font-bold border border-gray-700">CONNECTING...</div>
    </header>

    <main class="p-4">
        
        <section id="market-view" class="tab-content active space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex gap-6 text-sm font-bold">
                    <button onclick="toggleMarket('buy')" id="tab-buy" class="pb-1 active-tab-border">Buy</button>
                    <button onclick="toggleMarket('sell')" id="tab-sell" class="pb-1 text-gray-500">Sell</button>
                </div>
                <button onclick="openOrderModal()" class="bg-gray-800 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-gray-700">
                    <i class="fa-solid fa-plus text-yellow-ax mr-1"></i> POST AD
                </button>
            </div>

            <div id="ad-container" class="space-y-3">
                <p class="text-center text-gray-500 text-xs py-10">No active ads found...</p>
            </div>
        </section>

        <section id="profile-view" class="tab-content space-y-4">
            <div class="bg-card p-5 rounded-2xl border border-gray-800 flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center font-bold" id="p-icon">U</div>
                <div>
                    <h2 class="font-bold" id="p-name">Username</h2>
                    <p id="p-status" class="text-[10px] text-gray-400 mt-1 uppercase tracking-tighter">Status: Loading...</p>
                </div>
            </div>
            
            <div class="bg-card p-4 rounded-xl border border-gray-800">
                <h3 class="text-xs font-bold mb-2">Verification</h3>
                <div id="kyc-area">
                     <button onclick="db.ref('users/'+user.id).update({status:'pending'}); tg.showAlert('Submitted!')" class="w-full bg-blue-600 py-2 rounded text-xs font-bold">Request Verification</button>
                </div>
            </div>
        </section>

        <section id="admin-view" class="tab-content space-y-4">
            <h2 class="text-red-500 font-black">Admin Panel</h2>
            <div id="admin-queue" class="space-y-2"></div>
        </section>
    </main>

    <div id="order-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-card w-full max-w-sm rounded-2xl p-6 border border-gray-700">
            <h2 class="text-lg font-bold mb-4">Post New Ad</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">Ad Type</label>
                    <select id="ad-type" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded text-sm outline-none">
                        <option value="buy">I want to Buy (P2P Buy)</option>
                        <option value="sell">I want to Sell (P2P Sell)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">Price per USDT (ETB)</label>
                    <input type="number" id="ad-price" placeholder="e.g. 124.50" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded text-sm outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 block mb-1">Total Amount (USDT)</label>
                    <input type="number" id="ad-amount" placeholder="e.g. 100" class="w-full bg-[#0b0e11] border border-gray-700 p-2 rounded text-sm outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeOrderModal()" class="flex-1 bg-gray-700 py-2 rounded font-bold text-xs">Cancel</button>
                    <button onclick="submitAd()" class="flex-1 bg-yellow-ax py-2 rounded font-bold text-xs text-black">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-card border-t border-gray-800 flex justify-around p-3 pb-6">
        <button onclick="switchTab('market')" id="nav-market" class="nav-btn active flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px] mt-1">Market</span></button>
        <button onclick="switchTab('profile')" id="nav-profile" class="nav-btn flex flex-col items-center"><i class="fa-solid fa-user"></i><span class="text-[10px] mt-1">Profile</span></button>
        <button onclick="switchTab('admin')" id="nav-admin" class="nav-btn hidden flex flex-col items-center text-red-400"><i class="fa-solid fa-crown"></i><span class="text-[10px] mt-1">Admin</span></button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD3getH9kSW2oHuOI9AZR8t4yZ34_jPZG0",
            authDomain: "atomx-exchange.firebaseapp.com",
            databaseURL: "https://atomx-exchange-default-rtdb.firebaseio.com",
            projectId: "atomx-exchange",
            storageBucket: "atomx-exchange.firebasestorage.app",
            messagingSenderId: "228796594910",
            appId: "1:228796594910:web:c51b4fc1158e30fb3ea04f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: 1234, first_name: "Test" };
        const ADMIN_ID = 7798504269; // የአንተን ID እዚህ አስገባ

        let currentMarketMode = 'buy'; 

        window.onload = () => {
            tg.expand();
            if(user.id === ADMIN_ID) document.getElementById('nav-admin').classList.remove('hidden');
            document.getElementById('p-name').innerText = user.first_name;
            document.getElementById('p-icon').innerText = user.first_name.charAt(0);
            
            // Listen for data
            loadUserData();
            loadAds();
        };

        function loadUserData() {
            db.ref('users/' + user.id).on('value', (s) => {
                const d = s.val() || {};
                const status = d.status || 'unverified';
                const h = document.getElementById('header-status');
                h.innerText = status.toUpperCase();
                h.className = status === 'verified' ? "text-[10px] px-2 py-1 rounded font-bold border border-green-800 text-green-500" : "text-[10px] px-2 py-1 rounded font-bold border border-yellow-800 text-yellow-500";
                document.getElementById('p-status').innerText = "Status: " + status;
            });
        }

        function toggleMarket(mode) {
            currentMarketMode = mode;
            document.getElementById('tab-buy').className = mode === 'buy' ? 'pb-1 active-tab-border' : 'pb-1 text-gray-500';
            document.getElementById('tab-sell').className = mode === 'sell' ? 'pb-1 active-tab-border' : 'pb-1 text-gray-500';
            loadAds();
        }

        function loadAds() {
            db.ref('ads').on('value', (s) => {
                const ads = s.val();
                const container = document.getElementById('ad-container');
                container.innerHTML = '';
                let count = 0;

                for(let id in ads) {
                    const ad = ads[id];
                    if(ad.type === currentMarketMode) {
                        count++;
                        container.innerHTML += `
                        <div class="bg-card p-4 rounded-xl border border-gray-800 flex justify-between items-center shadow-md">
                            <div>
                                <div class="flex items-center gap-1 mb-1">
                                    <span class="text-xs font-bold">${ad.userName}</span>
                                    <i class="fa-solid fa-circle-check text-green-500 text-[8px]"></i>
                                </div>
                                <p class="text-[10px] text-gray-500">Amount: <span class="text-white">${ad.amount} USDT</span></p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-yellow-ax">${ad.price} <span class="text-[8px] text-gray-400 uppercase">ETB</span></p>
                                <button onclick="tg.showAlert('Order request sent to ${ad.userName}')" class="${currentMarketMode === 'buy' ? 'bg-yellow-ax' : 'bg-red-500 text-white'} px-6 py-1.5 rounded-lg text-[10px] font-bold mt-1 uppercase">${currentMarketMode.toUpperCase()}</button>
                            </div>
                        </div>`;
                    }
                }
                if(count === 0) container.innerHTML = '<p class="text-center text-gray-500 text-xs py-10 italic">No ' + currentMarketMode + ' orders yet.</p>';
            });
        }

        function openOrderModal() { document.getElementById('order-modal').classList.remove('hidden'); }
        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }

        function submitAd() {
            const price = document.getElementById('ad-price').value;
            const amount = document.getElementById('ad-amount').value;
            const type = document.getElementById('ad-type').value;

            if(!price || !amount) return tg.showAlert("Please fill all fields!");

            db.ref('ads').push({
                userId: user.id,
                userName: user.first_name,
                price: price,
                amount: amount,
                type: type,
                timestamp: Date.now()
            }).then(() => {
                tg.showAlert("Ad posted successfully!");
                closeOrderModal();
            });
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'admin') loadAdmin();
        }

        function loadAdmin() {
            db.ref('users').on('value', (s) => {
                const users = s.val();
                const q = document.getElementById('admin-queue');
                q.innerHTML = '';
                for(let id in users) {
                    if(users[id].status === 'pending') {
                        q.innerHTML += `<div class="bg-card p-3 rounded border border-gray-700 flex justify-between items-center text-xs">
                            <span>${users[id].name}</span>
                            <div class="flex gap-2">
                                <button onclick="db.ref('users/${id}').update({status:'verified'})" class="bg-green-600 px-2 py-1 rounded">Approve</button>
                                <button onclick="db.ref('users/${id}').update({status:'unverified'})" class="bg-red-600 px-2 py-1 rounded">Reject</button>
                            </div>
                        </div>`;
                    }
                }
            });
        }
    </script>
</body>
</html>
